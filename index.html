<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NDV — Дайджест фондового рынка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #F0F2F8; color: #1a1a2e; line-height: 1.6; }

    .header {
      background: linear-gradient(135deg, #2828E0 0%, #4040FF 50%, #2828E0 100%);
      color: white; padding: 48px 24px 40px; text-align: center;
      position: relative; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; top: -40%; left: -10%; width: 120%; height: 180%;
      background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(255,255,255,0.05) 0%, transparent 50%);
      pointer-events: none;
    }
    .logo-container { position: relative; z-index: 1; margin-bottom: 16px; }
    .logo-container svg { width: 80px; height: 80px; }
    .header h1 { font-size: 2rem; font-weight: 800; letter-spacing: 0.02em; position: relative; z-index: 1; }
    .header p { font-size: 1.05rem; opacity: 0.8; margin-top: 6px; position: relative; z-index: 1; }

    .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
    .digest-list { list-style: none; }
    .digest-item {
      background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(40,40,224,0.06);
      transition: transform 0.15s, box-shadow 0.15s;
      border-left: 4px solid transparent;
    }
    .digest-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(40,40,224,0.12);
      border-left-color: #3333FF;
    }
    .digest-item a { text-decoration: none; color: inherit; display: block; }
    .digest-date { font-size: 0.8rem; color: #8888AA; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    .digest-title { font-size: 1.25rem; font-weight: 700; color: #2020CC; margin: 6px 0; }
    .digest-meta { font-size: 0.9rem; color: #6b7280; }
    .digest-tickers { display: inline-flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .ticker-badge {
      background: #ECEEFF; color: #3333FF; padding: 3px 12px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.03em;
    }
    .empty-state { text-align: center; padding: 80px 24px; color: #8888AA; }
    .empty-state p { font-size: 1.1rem; }
    .footer {
      text-align: center; padding: 32px 24px; color: #9ca3af; font-size: 0.85rem;
      border-top: 1px solid #e0e0e8; margin-top: 16px;
    }
    .footer span { color: #3333FF; font-weight: 600; }

    @media (max-width: 640px) {
      .header h1 { font-size: 1.5rem; }
      .logo-container svg { width: 60px; height: 60px; }
      .digest-item { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- NDV Bear Logo -->
        <path d="M30 50 L60 20 L85 50 L100 35 L115 50 L140 20 L170 50 L170 120 L140 120 L140 100 L125 115 L100 95 L75 115 L60 100 L60 120 L30 120 Z" fill="white"/>
        <text x="100" y="170" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="800" fill="white">NDV</text>
      </svg>
    </div>
    <h1>Дайджест фондового рынка</h1>
    <p>Автоматический AI-обзор рынка акций</p>
  </div>
  <div class="container">
    <ul class="digest-list" id="digestList"></ul>
    <div class="empty-state" id="emptyState" style="display:none;">
      <p>Дайджесты пока не опубликованы</p>
    </div>
  </div>
  <div class="footer">
    Создано с помощью <span>Claude AI</span> &middot; Данные: FMP, Finnhub, Massive Market Data, Perplexity Finance
  </div>
  <script>
    fetch('digests/index.json')
      .then(r => r.json())
      .then(items => {
        const list = document.getElementById('digestList');
        if (!items.length) { document.getElementById('emptyState').style.display = 'block'; return; }
        items.sort((a, b) => b.date.localeCompare(a.date));
        items.forEach(item => {
          const li = document.createElement('li');
          li.className = 'digest-item';
          const tickers = (item.tickers || []).map(t => `<span class="ticker-badge">${t}</span>`).join('');
          li.innerHTML = `<a href="digests/${item.file}">
            <div class="digest-date">${item.date}</div>
            <div class="digest-title">${item.title}</div>
            <div class="digest-meta">${item.mode} &middot; ${item.period}</div>
            ${tickers ? `<div class="digest-tickers">${tickers}</div>` : ''}
          </a>`;
          list.appendChild(li);
        });
      })
      .catch(() => { document.getElementById('emptyState').style.display = 'block'; });
  </script>
</body>
</html>
